<!DOCTYPE html>
<html>
<body>

<script>

async function generar() {

  let res = await fetch("config.json");
  let data = await res.json();

  let { providers, canales } = data;

  let m3u = "#EXTM3U\n\n";

  canales.forEach(c => {

    let best = c.sources[0]; // prioridad (fase 1)

    let url = "";

    if (best.type === "hls") {
      url = best.url;
    }

    if (best.type === "youtube") {
      url = "https://www.youtube.com/embed/videoseries?list=" + best.playlistId;
    }

    if (best.type === "iptv") {
      let p = providers[best.provider];
      url = `${p.base}/live/${p.user}/${p.pass}/${best.stream_id}.m3u8`;
    }

    m3u += `#EXTINF:-1 group-title="${c.category}",${c.name}\n`;
    m3u += url + "\n\n";

  });

  document.body.innerText = m3u;
}

generar();

</script>

</body>
</html>
