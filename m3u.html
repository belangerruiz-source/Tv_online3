<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M3U Generator</title>
</head>

<body>

<script>

async function generar() {

  try {

    let res = await fetch("config.json");
    let data = await res.json();

    let { providers, canales } = data;

    let m3u = "#EXTM3U\n\n";

    canales.forEach(c => {

      let s = c.sources[0];
      let url = "";

      if (s.type === "hls") {
        url = s.url;
      }

      if (s.type === "iptv") {
        let p = providers[s.provider];
        if (p) {
          url = `${p.base}/live/${p.user}/${p.pass}/${s.stream_id}.m3u8`;
        }
      }

      // ❌ YouTube NO se incluye en M3U
      if (s.type === "youtube") return;

      if (!url) return;

      m3u += `#EXTINF:-1 group-title="${c.category}",${c.name}\n`;
      m3u += url + "\n\n";

    });

    // 🔥 IMPORTANTE: esto imprime SOLO el M3U
    document.open();
    document.write(m3u);
    document.close();

  } catch (e) {
    document.body.innerText = "Error: " + e;
  }

}

generar();

</script>

</body>
</html>
