<!DOCTYPE html>
<html>
<body>

<script>

async function generarM3U() {

  let res = await fetch("config.json");
  let data = await res.json();

  let { providers, canales } = data;

  let m3u = "#EXTM3U\n\n";

  canales.forEach(c => {

    let source = c.sources[0];
    let url = "";

    if (source.type === "hls") {
      url = source.url;
    }

    if (source.type === "youtube") {
      url = "https://www.youtube.com/embed/videoseries?list=" + source.playlistId;
    }

    if (source.type === "iptv") {
      let p = providers[source.provider];
      url = `${p.base}/live/${p.user}/${p.pass}/${source.stream_id}.m3u8`;
    }

    m3u += `#EXTINF:-1 group-title="${c.category}",${c.name}\n`;
    m3u += url + "\n\n";

  });

  document.body.innerText = m3u;
}

generarM3U();

</script>

</body>
</html>
