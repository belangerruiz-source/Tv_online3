<!DOCTYPE html>
<html>
<body>

<pre id="out"></pre>

<script>

async function generar() {

  let res = await fetch("config.json");
  let data = await res.json();

  let { providers, canales } = data;

  let m3u = "#EXTM3U\n\n";

  canales.forEach(c => {

    let s = c.sources[0];
    let url = "";

    if (s.type === "hls") url = s.url;

    if (s.type === "iptv") {
      let p = providers[s.provider];
      url = `${p.base}/live/${p.user}/${p.pass}/${s.stream_id}.m3u8`;
    }

    if (s.type === "youtube") {
      url = `https://www.youtube.com/watch?v=${s.playlistId}`;
    }

    m3u += `#EXTINF:-1 group-title="${c.category}",${c.name}\n`;
    m3u += url + "\n\n";

  });

  document.body.innerText = m3u;

}

generar();

</script>

</body>
</html>
