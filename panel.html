<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  margin:0;
  background:#121212;
  color:#eaeaea;
  font-family: Arial;
  font-size:16px;
}

.container {
  padding:15px;
  max-width:100%;
}

h1,h2 {
  color:#4da6ff;
}

.section {
  background:#1e1e1e;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

input, textarea, select {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#000;
  color:white;
  border:1px solid #333;
  border-radius:6px;
}

button {
  padding:6px 10px;
  margin:5px;
  background:#4da6ff;
  border:none;
  border-radius:6px;
  color:white;
  width:auto;
}

.result {
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
}
</style>

</head>

<body>

<div class="container">

<h1>📺 Panel IPTV</h1>

<!-- PROVEEDORES -->
<div class="section">
<h2>Proveedores</h2>

<select id="prov_type">
<option value="m3u">M3U</option>
<option value="xtream">Xtream</option>
</select>

<input id="prov_name" placeholder="Nombre">

<input id="prov_url" placeholder="URL M3U">

<div id="xtream_block" style="display:none;">
<input id="prov_base" placeholder="Base">
<input id="prov_user" placeholder="User">
<input id="prov_pass" placeholder="Pass">
</div>

<button onclick="addProvider()">Agregar</button>
<button onclick="cargarLista()">Cargar lista</button>

</div>

<!-- BUSCADOR -->
<div class="section">
<h2>Buscar canal</h2>

<input id="searchName" placeholder="Nombre canal">

<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>
</div>

<!-- LISTA -->
<div class="section">
<h2>Canales</h2>
<div id="list"></div>
</div>

<!-- JSON -->
<div class="section">
<h2>JSON</h2>

<button onclick="resetJSON()">Reiniciar</button>
<textarea id="json"></textarea>

<button onclick="download()">Descargar</button>
</div>

</div>

<script>

let data = { providers:{}, canales:[] };
let cache = {}; // 🔥 listas cargadas

// cargar guardado
let saved = localStorage.getItem("iptv_data");
if (saved) data = JSON.parse(saved);

// UI xtream
prov_type.onchange = () => {
  xtream_block.style.display = prov_type.value === "xtream" ? "block" : "none";
};

// agregar proveedor
function addProvider() {

  let name = prov_name.value;

  if (prov_type.value === "m3u") {
    data.providers[name] = { type:"m3u", url:prov_url.value };
  }

  if (prov_type.value === "xtream") {
    data.providers[name] = {
      type:"xtream",
      base:prov_base.value,
      user:prov_user.value,
      pass:prov_pass.value
    };
  }

  render();
}

// 🔥 cargar lista UNA VEZ
async function cargarLista() {

  let name = prov_name.value;
  let p = data.providers[name];

  if (!p) return alert("Proveedor no existe");

  if (p.type !== "m3u") return alert("Solo M3U aquí");

  try {
    let res = await fetch(p.url);
    let text = await res.text();

    cache[name] = parseM3U(text);

    alert("Lista cargada: " + name);

  } catch {
    alert("Error cargando lista");
  }
}

// parse m3u
function parseM3U(text) {

  let lines = text.split("\n");
  let out = [];

  for (let i=0;i<lines.length;i++) {

    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1];
      let url = lines[i+1];

      out.push({name,url});
    }
  }

  return out;
}

// 🔍 buscar en TODOS los proveedores cargados
function buscar() {

  let name = searchName.value.toLowerCase();
  resultados.innerHTML = "";

  for (let prov in cache) {

    let lista = cache[prov];

    lista.forEach(c => {

      if (c.name.toLowerCase().includes(name)) {

        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
          ${c.name} (${prov})
          <button onclick="agregar('${c.name}','${c.url}')">Agregar</button>
        `;

        resultados.appendChild(div);
      }

    });
  }
}

// agregar canal
function agregar(name,url) {

  data.canales.push({
    name,
    category:"IPTV",
    sources:[{type:"hls", url}]
  });

  render();
}

// eliminar
function removeChannel(i) {
  data.canales.splice(i,1);
  render();
}

// render
function render() {

  list.innerHTML="";

  data.canales.forEach((c,i)=>{

    let div=document.createElement("div");
    div.className="result";

    div.innerHTML=`
      ${c.name}
      <button onclick="removeChannel(${i})">❌</button>
    `;

    list.appendChild(div);
  });

  json.value = JSON.stringify(data,null,2);
  localStorage.setItem("iptv_data", JSON.stringify(data));
}

// reset
function resetJSON(){
  if(confirm("Reiniciar?")){
    data={providers:{},canales:[]};
    cache={};
    render();
  }
}

// descargar
function download(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="config.json";
  a.click();
}

render();

</script>

</body>
</html>
