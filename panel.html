<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  margin:0;
  background:#121212;
  color:#fff;
  font-family: Arial;
  font-size:16px;
}

.container {
  padding:15px;
}

.section {
  background:#1e1e1e;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

button {
  padding:6px 10px;
  margin:5px;
  background:#4da6ff;
  border:none;
  color:white;
}

.result {
  border-bottom:1px solid #333;
  padding:6px;
  display:flex;
  justify-content:space-between;
}

.stat {
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h2>📺 Panel IPTV PRO</h2>

<div class="section">
<h3>🔎 Buscar canal</h3>
<input id="searchName" placeholder="Nombre canal">
<button onclick="buscar()">Buscar</button>
<div id="resultados"></div>
</div>

<div class="section">
<h3>📊 Proveedores</h3>
<div id="stats"></div>
<button onclick="cargarTodas()">Cargar todas las listas</button>
</div>

<div class="section">
<h3>📋 Canales</h3>
<div id="list"></div>
</div>

<div class="section">
<h3>💾 JSON</h3>
<textarea id="json"></textarea>
<button onclick="download()">Descargar</button>
</div>

</div>

<script>

let providers = {};
let cache = {};
let data = { canales:[] };

// cargar providers
async function init() {
  let res = await fetch("providers.json");
  providers = await res.json();

  renderStats();
}

function renderStats() {

  let div = document.getElementById("stats");
  div.innerHTML = "";

  for (let p in providers) {

    let total = cache[p] ? cache[p].length : 0;
    let usados = data.canales.filter(c =>
      c.sources[0]?.provider === p
    ).length;

    div.innerHTML += `
      <div class="stat">
        ${p} → encontrados: ${total} | usados: ${usados}
      </div>
    `;
  }
}

// cargar listas
async function cargarTodas() {

  for (let p in providers) {

    let prov = providers[p];

    if (prov.type !== "m3u") continue;

    try {
      let res = await fetch(prov.url);
      let text = await res.text();

      cache[p] = parseM3U(text);

    } catch {
      console.log("Error en", p);
    }
  }

  renderStats();
}

// parse m3u
function parseM3U(text) {

  let lines = text.split("\n");
  let out = [];

  for (let i=0;i<lines.length;i++) {
    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1];
      let url = lines[i+1];
      out.push({name,url});
    }
  }

  return out;
}

// buscar
function buscar() {

  let name = searchName.value.toLowerCase();
  resultados.innerHTML = "";

  for (let p in cache) {

    cache[p].forEach(c => {

      if (c.name.toLowerCase().includes(name)) {

        let div = document.createElement("div");
        div.className="result";

        div.innerHTML = `
          ${c.name} (${p})
          <button onclick="agregar('${c.name}','${c.url}','${p}')">Agregar</button>
        `;

        resultados.appendChild(div);
      }

    });
  }
}

// agregar
function agregar(name,url,p) {

  data.canales.push({
    name,
    category:"IPTV",
    sources:[{type:"hls",url,provider:p}]
  });

  render();
}

// eliminar
function remove(i){
  data.canales.splice(i,1);
  render();
}

// render
function render() {

  list.innerHTML="";

  data.canales.forEach((c,i)=>{
    list.innerHTML += `
      <div class="result">
        ${c.name}
        <button onclick="remove(${i})">❌</button>
      </div>
    `;
  });

  json.value = JSON.stringify(data,null,2);

  renderStats();
}

// descargar
function download(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="config.json";
  a.click();
}

init();

</script>

</body>
</html>
