<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  background: #0f1115;
  color: #e4e6eb;
  font-family: Arial, sans-serif;
  padding: 20px;
}

h1, h2 {
  color: #4da6ff;
}

.section {
  border: 1px solid #2a2d35;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
  background: #1a1d24;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  background: #0f1115;
  color: white;
  border: 1px solid #333;
  border-radius: 5px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
  background: #4da6ff;
  border: none;
  border-radius: 5px;
  color: white;
}

button:hover {
  background: #2d8cff;
}

.channel {
  border-bottom: 1px solid #333;
  padding: 8px;
  display: flex;
  justify-content: space-between;
}

textarea#json {
  height: 350px;
}
</style>

</head>

<body>

<h1>📺 Panel IPTV PRO</h1>

<!-- PROVEEDORES -->
<div class="section">
<h2>➕ Proveedores</h2>

<input id="prov_name" placeholder="Nombre proveedor (ej: p1)">
<input id="prov_base" placeholder="Base URL">
<input id="prov_user" placeholder="Usuario">
<input id="prov_pass" placeholder="Password">

<button onclick="addProvider()">Agregar proveedor</button>
</div>

<!-- CANALES -->
<div class="section">
<h2>➕ Canales (puedes agregar varios)</h2>

<textarea id="bulk" placeholder="
Formato:

nombre|tipo|valor|categoria|proveedor

Ejemplos:

DW Español|hls|https://dwstreamlive.akamaized.net/hls/live/...|Noticias|
France24|hls|https://static.france24.com/live/...|Noticias|
HBO|iptv|12345|Películas|p1
YouTube Noticias|youtube|PLXXXXX|Noticias|

👉 Para YouTube usa SOLO el ID de la playlist (PLXXXXX)
"></textarea>

<button onclick="addBulk()">Agregar canales</button>

</div>

<!-- LISTA -->
<div class="section">
<h2>📋 Lista de canales</h2>
<div id="list"></div>
</div>

<!-- JSON -->
<div class="section">
<h2>💾 JSON</h2>
<textarea id="json"></textarea>
<button onclick="download()">Descargar config.json</button>
</div>

<script>

let data = {
  providers: {},
  canales: [

    // 🔥 CANALES LIBRES INICIALES
    {
      name: "DW Español",
      category: "Noticias",
      sources: [
        { type: "hls", url: "https://dwstreamlive.akamaized.net/hls/live/2015537/dwstreamlive_es/master.m3u8" }
      ]
    },
    {
      name: "France 24 Español",
      category: "Noticias",
      sources: [
        { type: "hls", url: "https://static.france24.com/live/F24_ES_HI_HLS/live_web.m3u8" }
      ]
    }
  ]
};

// ➕ PROVEEDOR
function addProvider() {

  let name = prov_name.value;

  data.providers[name] = {
    base: prov_base.value,
    user: prov_user.value,
    pass: prov_pass.value
  };

  render();
}

// ➕ CANALES MASIVOS
function addBulk() {

  let lines = bulk.value.split("\n");

  lines.forEach(line => {

    if (!line.trim()) return;

    let [name, type, value, category, provider] = line.split("|");

    let source = {};

    if (type === "hls") {
      source = { type: "hls", url: value };
    }

    if (type === "youtube") {
      source = { type: "youtube", playlistId: value };
    }

    if (type === "iptv") {
      source = { type: "iptv", provider: provider, stream_id: value };
    }

    data.canales.push({
      name,
      category,
      sources: [source]
    });

  });

  bulk.value = "";
  render();
}

// ❌ ELIMINAR CANAL
function removeChannel(index) {
  if (confirm("¿Eliminar canal?")) {
    data.canales.splice(index, 1);
    render();
  }
}

// 🔄 RENDER
function render() {

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.canales.forEach((c, i) => {

    let div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      <span>${c.name} (${c.category})</span>
      <button onclick="removeChannel(${i})">Eliminar</button>
    `;

    list.appendChild(div);
  });

  json.value = JSON.stringify(data, null, 2);
}

// 💾 DESCARGAR
function download() {
  let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "config.json";
  a.click();
}

// INIT
render();

</script>

</body>
</html>
