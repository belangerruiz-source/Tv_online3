<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  background: #111;
  color: white;
  font-family: sans-serif;
  padding: 20px;
}

.section {
  border: 1px solid #333;
  padding: 10px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  margin: 5px;
  cursor: pointer;
}

.channel {
  border-bottom: 1px solid #333;
  padding: 5px;
}
</style>

</head>

<body>

<h1>📺 Panel IPTV PRO</h1>

<!-- PROVEEDORES -->
<div class="section">
<h2>➕ Proveedores</h2>

<input id="prov_name" placeholder="Nombre proveedor">
<input id="prov_base" placeholder="Base URL">
<input id="prov_user" placeholder="Usuario">
<input id="prov_pass" placeholder="Password">

<button onclick="addProvider()">Agregar proveedor</button>

</div>

<!-- CANALES -->
<div class="section">
<h2>➕ Canales (puedes agregar varios)</h2>

<textarea id="bulk" placeholder="
Formato por línea:

nombre|tipo|valor|categoria|proveedor

Ejemplo:
DW Español|hls|https://...|Noticias|
HBO|iptv|12345|Películas|p1
YouTube Noticias|youtube|PLXXXXX|Noticias|
"></textarea>

<button onclick="addBulk()">Agregar canales</button>

</div>

<!-- LISTA -->
<div class="section">
<h2>📋 Lista de canales</h2>
<div id="list"></div>
</div>

<!-- JSON -->
<div class="section">
<h2>💾 JSON</h2>
<textarea id="json"></textarea>
<button onclick="download()">Guardar config.json</button>
</div>

<script>

let data = {
  providers: {},
  canales: []
};

// 🔥 AGREGAR PROVEEDOR
function addProvider() {
  let name = prov_name.value;

  data.providers[name] = {
    base: prov_base.value,
    user: prov_user.value,
    pass: prov_pass.value
  };

  render();
}

// 🔥 AGREGAR MUCHOS CANALES
function addBulk() {

  let lines = bulk.value.split("\n");

  lines.forEach(line => {

    if (!line.trim()) return;

    let [name, type, value, category, provider] = line.split("|");

    let source = {};

    if (type === "hls") {
      source = { type: "hls", url: value };
    }

    if (type === "youtube") {
      source = { type: "youtube", playlistId: value };
    }

    if (type === "iptv") {
      source = { type: "iptv", provider: provider, stream_id: value };
    }

    data.canales.push({
      name,
      category,
      sources: [source]
    });

  });

  bulk.value = "";
  render();
}

// 🔥 ELIMINAR CANAL
function removeChannel(index) {
  data.canales.splice(index, 1);
  render();
}

// 🔥 RENDER
function render() {

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.canales.forEach((c, i) => {

    let div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      ${c.name} (${c.category})
      <button onclick="removeChannel(${i})">❌</button>
    `;

    list.appendChild(div);
  });

  json.value = JSON.stringify(data, null, 2);
}

// 💾 DESCARGAR JSON
function download() {
  let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "config.json";
  a.click();
}

</script>

</body>
</html>
