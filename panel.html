<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV</title>

<style>
body {
  background: #111;
  color: white;
  font-family: sans-serif;
  padding: 20px;
}

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}

textarea {
  width: 100%;
  height: 200px;
  background: #000;
  color: #0f0;
}
</style>

</head>

<body>

<h1>📺 Panel IPTV</h1>

<h2>Agregar canal</h2>

<input id="name" placeholder="Nombre canal">
<input id="category" placeholder="Categoría">

<select id="type">
  <option value="hls">HLS</option>
  <option value="iptv">IPTV</option>
  <option value="youtube">YouTube</option>
</select>

<input id="value" placeholder="URL / stream_id / playlistId">
<input id="provider" placeholder="Proveedor (si IPTV)">

<button onclick="add()">Agregar</button>

<h2>JSON</h2>

<textarea id="output"></textarea>

<button onclick="download()">Guardar config.json</button>

<script>

let data = {
  providers: {},
  canales: []
};

function add() {

  let name = document.getElementById("name").value;
  let category = document.getElementById("category").value;
  let type = document.getElementById("type").value;
  let value = document.getElementById("value").value;
  let provider = document.getElementById("provider").value;

  let source = {};

  if (type === "hls") {
    source = { type: "hls", url: value };
  }

  if (type === "youtube") {
    source = { type: "youtube", playlistId: value };
  }

  if (type === "iptv") {
    source = { type: "iptv", provider: provider, stream_id: value };

    data.providers[provider] = {
      base: "http://server",
      user: "user",
      pass: "pass"
    };
  }

  data.canales.push({
    name,
    category,
    sources: [source]
  });

  render();
}

function render() {
  document.getElementById("output").value =
    JSON.stringify(data, null, 2);
}

function download() {
  let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "config.json";
  a.click();
}

</script>

</body>
</html>
