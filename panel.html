<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  margin:0;
  background:#121212;
  color:#fff;
  font-family: Arial;
  font-size:18px;
}

.container {
  width:100%;
  padding:10px;
  box-sizing:border-box;
}

.section {
  background:#1e1e1e;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#000;
  color:#fff;
  border:1px solid #333;
  font-size:16px;
}

button {
  padding:8px 12px;
  margin:5px 0;
  background:#4da6ff;
  border:none;
  color:white;
  font-size:16px;
  border-radius:6px;
}

.result {
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
}

.stat {
  font-size:14px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="container">

<h2> Panel IPTV</h2>

<div class="section">
<h3> Buscar canal</h3>

<input id="searchName" placeholder="Nombre canal">
<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>
</div>

<div class="section">
<h3> Proveedores</h3>

<button id="loadBtn" onclick="cargarTodas()">Cargar listas</button>

<div id="loading"></div>
<div id="stats"></div>
</div>

<div class="section">
<h3> Canales</h3>
<div id="list"></div>
</div>

<div class="section">
<h3> JSON</h3>

<button onclick="copyJSON()">Copiar JSON</button>

<textarea id="json"></textarea>
</div>

</div>

<script>

let providers = {};
let cache = {};
let data = { canales:[] };

//  cargar providers.json
async function init() {
  let res = await fetch("providers.json");
  providers = await res.json();
  renderStats();
}

//  CARGAR LISTAS
async function cargarTodas() {

  loadBtn.innerText = "Cargando...";
  loading.innerText = "Cargando proveedores...";

  for (let p in providers) {

    let prov = providers[p];

    try {

      //  M3U
      if (prov.type === "m3u") {

        let res = await fetch(prov.url);
        let text = await res.text();

        cache[p] = parseM3U(text);

      }

      //  XTREAM
      if (prov.type === "xtream") {

        let url = `${prov.base}/player_api.php?username=${prov.user}&password=${prov.pass}`;

        let res = await fetch(url);
        let json = await res.json();

        let channels = json.live_streams || [];

        cache[p] = channels.map(c => ({
          name: c.name,
          url: `${prov.base}/live/${prov.user}/${prov.pass}/${c.stream_id}.m3u8`
        }));

      }

    } catch {
      console.log("Error en", p);
    }
  }

  loadBtn.innerText = "Cargar listas";
  loading.innerText = " Listas cargadas";

  renderStats();
}

// parse m3u
function parseM3U(text) {

  let lines = text.split("\n");
  let out = [];

  for (let i=0;i<lines.length;i++) {

    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1];
      let url = lines[i+1];

      out.push({name,url});
    }
  }

  return out;
}

//  BUSCAR
function buscar() {

  let name = searchName.value.toLowerCase();
  resultados.innerHTML = "";

  for (let p in cache) {

    cache[p].forEach(c => {

      if (c.name.toLowerCase().includes(name)) {

        let div = document.createElement("div");
        div.className="result";

        div.innerHTML = `
          ${c.name} (${p})
          <button onclick="agregar('${c.name}','${c.url}')">+</button>
        `;

        resultados.appendChild(div);
      }
    });
  }
}

//  AGREGAR (fallback)
function agregar(name,url) {

  let existing = data.canales.find(c => c.name === name);

  if (existing) {
    existing.sources.push({type:"hls",url});
  } else {
    data.canales.push({
      name,
      category:"IPTV",
      sources:[{type:"hls",url}]
    });
  }

  render();
}

//  eliminar
function remove(i){
  data.canales.splice(i,1);
  render();
}

// render
function render(){

  list.innerHTML="";

  data.canales.forEach((c,i)=>{
    list.innerHTML+=`
      <div class="result">
        ${c.name} (${c.sources.length})
        <button onclick="remove(${i})"></button>
      </div>
    `;
  });

  json.value = JSON.stringify(data,null,2);

  localStorage.setItem("iptv_data", JSON.stringify(data));

  renderStats();
}

// stats
function renderStats(){

  stats.innerHTML="";

  for (let p in providers){

    let total = cache[p]?.length || 0;

    let usados = data.canales.filter(c =>
      c.sources.some(s =>
        cache[p]?.some(x => x.url === s.url)
      )
    ).length;

    stats.innerHTML += `
      <div class="stat">
        ${p}: ${total} encontrados | ${usados} usados
      </div>
    `;
  }
}

// copiar JSON
function copyJSON(){
  navigator.clipboard.writeText(json.value);
  alert("JSON copiado");
}

init();

</script>

</body>
</html>
