<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  margin:0;
  background:#0f1115;
  color:#e4e6eb;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 100%;
  padding: 15px;
}

h1,h2 {
  color:#4da6ff;
}

.section {
  background:#1a1d24;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:1px solid #333;
  background:#0f1115;
  color:white;
}

button {
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
  background:#4da6ff;
  color:white;
  width:100%;
}

.channel {
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
}

textarea#json {
  height:300px;
}
</style>
</head>

<body>

<div class="container">

<h1>📺 Panel IPTV PRO</h1>

<!-- PROVEEDORES -->
<div class="section">
<h2>➕ Proveedores</h2>

<select id="prov_type">
<option value="m3u">M3U</option>
<option value="xtream">Xtream</option>
</select>

<input id="prov_name" placeholder="Nombre proveedor">

<input id="prov_url" placeholder="URL M3U">

<div id="xtream_block" style="display:none;">
<input id="prov_base" placeholder="Base URL">
<input id="prov_user" placeholder="Usuario">
<input id="prov_pass" placeholder="Password">
</div>

<button onclick="addProvider()">Agregar proveedor</button>

</div>

<!-- BUSCADOR M3U -->
<div class="section">
<h2>🔎 Buscar canal en lista M3U</h2>

<textarea id="m3uInput" placeholder="Pega aquí la lista M3U"></textarea>

<input id="searchName" placeholder="Nombre canal">

<button onclick="buscarCanal()">Buscar</button>

<div id="resultados"></div>

</div>

<!-- CANALES -->
<div class="section">
<h2>➕ Canales manuales</h2>

<textarea id="bulk" placeholder="
Formato:
nombre|tipo|valor|categoria|proveedor

Ej:
DW Español|hls|https://...|Noticias|
HBO|iptv|12345|Películas|p1
"></textarea>

<button onclick="addBulk()">Agregar canales</button>

</div>

<!-- LISTA -->
<div class="section">
<h2>📋 Canales</h2>
<div id="list"></div>
</div>

<!-- JSON -->
<div class="section">
<h2>💾 JSON</h2>

<button onclick="resetJSON()">Rehacer JSON</button>

<textarea id="json"></textarea>

<button onclick="download()">Descargar config.json</button>

</div>

</div>

<script>

let data = {
  providers: {},
  canales: []
};

// 🔥 CARGAR LOCAL
let saved = localStorage.getItem("iptv_data");
if (saved) data = JSON.parse(saved);

// 🔁 CAMBIO TIPO
prov_type.onchange = () => {
  xtream_block.style.display = prov_type.value === "xtream" ? "block" : "none";
};

// ➕ PROVEEDOR
function addProvider() {

  let name = prov_name.value;

  if (prov_type.value === "m3u") {
    data.providers[name] = {
      type: "m3u",
      url: prov_url.value
    };
  }

  if (prov_type.value === "xtream") {
    data.providers[name] = {
      type: "xtream",
      base: prov_base.value,
      user: prov_user.value,
      pass: prov_pass.value
    };
  }

  render();
}

// 🔎 PARSE M3U
function parseM3U(text) {

  let lines = text.split("\n");
  let canales = [];

  for (let i = 0; i < lines.length; i++) {

    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1];
      let url = lines[i+1];

      canales.push({ name, url });
    }
  }

  return canales;
}

// 🔎 BUSCAR
function buscarCanal() {

  let lista = parseM3U(m3uInput.value);
  let nombre = searchName.value.toLowerCase();

  let encontrados = lista.filter(c => c.name.toLowerCase().includes(nombre));

  resultados.innerHTML = "";

  encontrados.forEach(c => {

    let div = document.createElement("div");

    div.innerHTML = `
      ${c.name}
      <button onclick="agregarDesdeBusqueda('${c.name}','${c.url}')">Agregar</button>
    `;

    resultados.appendChild(div);
  });
}

// ➕ AGREGAR DESDE BUSQUEDA
function agregarDesdeBusqueda(name, url) {

  data.canales.push({
    name,
    category: "IPTV",
    sources: [
      { type: "hls", url: url }
    ]
  });

  render();
}

// ➕ MANUAL
function addBulk() {

  let lines = bulk.value.split("\n");

  lines.forEach(line => {

    if (!line.trim()) return;

    let [name, type, value, category, provider] = line.split("|");

    let source = {};

    if (type === "hls") source = { type: "hls", url: value };
    if (type === "iptv") source = { type: "iptv", provider, stream_id: value };

    data.canales.push({
      name,
      category,
      sources: [source]
    });

  });

  bulk.value = "";
  render();
}

// ❌ BORRAR
function removeChannel(i) {
  data.canales.splice(i, 1);
  render();
}

// 🔄 REHACER JSON
function resetJSON() {
  if (confirm("Reiniciar todo?")) {
    data = { providers:{}, canales:[] };
    render();
  }
}

// 🔄 RENDER
function render() {

  list.innerHTML = "";

  data.canales.forEach((c,i) => {

    let div = document.createElement("div");
    div.className = "channel";

    div.innerHTML = `
      ${c.name}
      <button onclick="removeChannel(${i})">❌</button>
    `;

    list.appendChild(div);
  });

  json.value = JSON.stringify(data,null,2);

  localStorage.setItem("iptv_data", JSON.stringify(data));
}

// 💾 DESCARGAR
function download() {
  let blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "config.json";
  a.click();
}

render();

</script>

</body>
</html>
