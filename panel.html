<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel IPTV PRO</title>

<style>
body {
  margin:0;
  background:#121212;
  color:#fff;
  font-family: Arial, sans-serif;
  overflow-x:hidden;
}

.container {
  max-width:100%;
  padding:10px;
  box-sizing:border-box;
}

.section {
  background:#1e1e1e;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

h2, h3 {
  color:#4da6ff;
  margin:5px 0;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:5px;
  font-size:16px;
  box-sizing:border-box;
}

button {
  padding:8px 10px;
  margin:5px 0;
  background:#4da6ff;
  border:none;
  border-radius:6px;
  color:white;
  font-size:15px;
}

.result {
  padding:8px;
  border-bottom:1px solid #333;
  display:flex;
  flex-direction:column;
}

.result button {
  margin-top:5px;
  width:auto;
}

.stat {
  font-size:13px;
  color:#aaa;
}

textarea#json {
  height:300px;
}
</style>

</head>

<body>

<div class="container">

<h2> Panel IPTV</h2>

<div class="section">
<h3> Buscar canal</h3>

<input id="searchName" placeholder="Nombre canal">
<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>
</div>

<div class="section">
<h3> Proveedores</h3>

<button id="loadBtn" onclick="cargarTodas()">Cargar listas</button>
<button onclick="actualizarListas()">Actualizar listas</button>

<div id="loading"></div>
<div id="stats"></div>
</div>

<div class="section">
<h3> Canales</h3>
<div id="list"></div>
</div>

<div class="section">
<h3> JSON</h3>

<button onclick="copyJSON()">Copiar JSON</button>

<textarea id="json"></textarea>
</div>

</div>

<script>

let providers = {};
let cache = JSON.parse(localStorage.getItem("iptv_cache") || "{}");
let data = JSON.parse(localStorage.getItem("iptv_data") || '{"canales":[]}');

// cargar providers.json
async function init() {
  let res = await fetch("providers.json");
  providers = await res.json();
  render();
  renderStats();
}

// cargar listas (con cache)
async function cargarTodas() {

  loadBtn.innerText = "Cargando...";
  loading.innerText = "Cargando listas...";

  for (let p in providers) {

    if (cache[p]) continue;

    let prov = providers[p];

    try {

      if (prov.type === "m3u") {
        let res = await fetch(prov.url);
        let text = await res.text();
        cache[p] = parseM3U(text);
      }

    } catch {
      console.log("Error en", p);
    }
  }

  localStorage.setItem("iptv_cache", JSON.stringify(cache));

  loadBtn.innerText = "Cargar listas";
  loading.innerText = " Listas cargadas";

  renderStats();
}

// actualizar listas manualmente
async function actualizarListas() {
  cache = {};
  localStorage.removeItem("iptv_cache");
  await cargarTodas();
}

// parse M3U
function parseM3U(text) {

  let lines = text.split("\n");
  let out = [];

  for (let i=0;i<lines.length;i++) {

    if (lines[i].startsWith("#EXTINF")) {
      let name = lines[i].split(",")[1];
      let url = lines[i+1];

      out.push({name,url});
    }
  }

  return out;
}

// buscar
function buscar() {

  let name = searchName.value.toLowerCase();
  resultados.innerHTML = "";

  for (let p in cache) {

    cache[p].forEach(c => {

      if (c.name.toLowerCase().includes(name)) {

        let div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
          <div>${c.name} (${p})</div>
          <button onclick="agregar('${c.name}','${c.url}')">Agregar</button>
        `;

        resultados.appendChild(div);
      }
    });
  }
}

// agregar con fallback
function agregar(name,url) {

  let existing = data.canales.find(c => c.name === name);

  if (existing) {

    if (!existing.sources.some(s => s.url === url)) {
      existing.sources.push({type:"hls",url});
    }

  } else {

    data.canales.push({
      name,
      category:"IPTV",
      sources:[{type:"hls",url}]
    });
  }

  guardar();
}

// eliminar
function remove(i){
  data.canales.splice(i,1);
  guardar();
}

// guardar
function guardar(){
  localStorage.setItem("iptv_data", JSON.stringify(data));
  render();
}

// render
function render(){

  list.innerHTML="";

  data.canales.forEach((c,i)=>{

    list.innerHTML += `
      <div class="result">
        <div>${c.name} (${c.sources.length} fuentes)</div>
        <button onclick="remove(${i})">Eliminar</button>
      </div>
    `;
  });

  json.value = JSON.stringify(data,null,2);

  renderStats();
}

// stats
function renderStats(){

  stats.innerHTML="";

  for (let p in providers){

    let total = cache[p]?.length || 0;

    let usados = data.canales.filter(c =>
      c.sources.some(s =>
        cache[p]?.some(x => x.url === s.url)
      )
    ).length;

    stats.innerHTML += `
      <div class="stat">
        ${p}: ${total} encontrados | ${usados} usados
      </div>
    `;
  }
}

// copiar JSON
function copyJSON(){
  navigator.clipboard.writeText(json.value);
  alert("JSON copiado");
}

init();

</script>

</body>
</html>
